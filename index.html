<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ обеда</title>
    <!-- Подключаем шрифт Google Fonts для красоты -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Подключаем Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Подключаем CSS стили -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .card-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .order-summary {
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
            border: 2px solid #667eea20;
        }

        .order-summary h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #667eea20;
        }

        .order-summary-item:last-child {
            border-bottom: none;
        }

        .order-summary-item .label {
            color: #666;
            font-weight: 400;
        }

        .order-summary-item .value {
            color: #333;
            font-weight: 500;
        }

        .confirmation-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
        }

        .confirmation-text {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .confirmation-text i {
            font-size: 20px;
            color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader i {
            font-size: 30px;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .card-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1><i class="fas fa-utensils"></i> Заказ обеда</h1>
                <p>Оформление заказа на питание</p>
            </div>
            
            <div class="card-body">
                <!-- Блок для сообщений -->
                <div id="alert" class="alert"></div>
                
                <!-- Индикатор загрузки -->
                <div id="loader" class="loader">
                    <i class="fas fa-circle-notch"></i>
                </div>
                
                <!-- Форма заказа -->
                <form id="orderForm">
                    <div class="form-group">
                        <label for="fullname"><i class="fas fa-user"></i> ФИО *</label>
                        <input type="text" id="fullname" name="fullname" required placeholder="Введите ваше полное имя">
                    </div>
                    
                    <div class="form-group">
                        <label for="facility"><i class="fas fa-building"></i> Название объекта *</label>
                        <input type="text" id="facility" name="facility" required placeholder="Где вы будете питаться">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone"><i class="fas fa-phone"></i> Телефон *</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <div class="form-group">
                        <label for="orderDate"><i class="fas fa-calendar-alt"></i> Дата заказа *</label>
                        <select id="orderDate" name="orderDate" required>
                            <option value="">Выберите дату</option>
                        </select>
                    </div>

                    <!-- Сводка заказа -->
                    <div class="order-summary">
                        <h3><i class="fas fa-shopping-basket"></i> Ваш заказ</h3>
                        <div class="order-summary-item">
                            <span class="label">Обед:</span>
                            <span class="value">Комплексный обед (суп + салат + горячее)</span>
                        </div>
                        <div class="order-summary-item">
                            <span class="label">Количество:</span>
                            <span class="value">1 порция</span>
                        </div>
                    </div>
                    
                    <!-- Простое подтверждение как в Google Forms -->
                    <div class="confirmation-box">
                        <div class="confirmation-text">
                            <i class="fas fa-check-circle"></i>
                            <span>Нажимая кнопку "Заказать обед", вы подтверждаете, что ознакомлены с правилами заказа и заказываете 1 порцию.</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-check"></i> Заказать обед
                    </button>
                </form>
            </div>
        </div>
        
        <div class="footer">
            <p>Заказы принимаются на выбранную дату</p>
        </div>
    </div>

    <!-- JavaScript код -->
    <script>
        // ЗАМЕНИТЕ ЭТО НА ВАШ URL ИЗ GOOGLE APPS SCRIPT
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/XXXXXXXXXXXXX/exec';
        
        const form = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const alertBox = document.getElementById('alert');
        const orderDateSelect = document.getElementById('orderDate');
        
        // Заполняем select с датами (сегодня, завтра, послезавтра)
        function populateDates() {
            const today = new Date();
            const dates = [];
            
            // Сегодня
            dates.push({
                date: new Date(today),
                label: 'Сегодня'
            });
            
            // Завтра
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            dates.push({
                date: new Date(tomorrow),
                label: 'Завтра'
            });
            
            // Послезавтра
            const afterTomorrow = new Date(today);
            afterTomorrow.setDate(afterTomorrow.getDate() + 2);
            dates.push({
                date: new Date(afterTomorrow),
                label: 'Послезавтра'
            });
            
            // Форматируем и добавляем в select
            dates.forEach((item, index) => {
                const year = item.date.getFullYear();
                const month = String(item.date.getMonth() + 1).padStart(2, '0');
                const day = String(item.date.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                
                // Для отображения добавляем день недели
                const weekdays = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
                const weekday = weekdays[item.date.getDay()];
                
                const option = document.createElement('option');
                option.value = dateStr;
                
                if (index === 0) {
                    option.textContent = `${item.label} (${weekday}) - ${dateStr}`;
                } else {
                    option.textContent = `${item.label} (${weekday}) - ${dateStr}`;
                }
                
                orderDateSelect.appendChild(option);
            });
        }
        
        // Функция показа сообщения
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            // Автоматически скрываем через 5 секунд
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
        
        // Функция для отправки данных
        async function submitOrder(data) {
            try {
                // Показываем загрузку
                loader.style.display = 'block';
                submitBtn.disabled = true;
                
                // Отправляем POST запрос к Google Apps Script
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                showAlert('Заказ успешно отправлен! Приятного аппетита!', 'success');
                form.reset(); // Очищаем форму
                
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Произошла ошибка. Пожалуйста, попробуйте еще раз или напишите вручную.', 'error');
            } finally {
                // Скрываем загрузку
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }
        
        // Обработчик отправки формы
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Отменяем стандартную отправку формы
            
            // Собираем данные из формы
            const formData = new FormData(form);
            
            const data = {
                fullname: formData.get('fullname'),
                facility: formData.get('facility'),
                phone: formData.get('phone'),
                orderDate: formData.get('orderDate'),
                meal: 'Комплексный обед (суп + салат + горячее)',
                quantity: 1,
                confirmation: 'Подтверждено'
            };
            
            // Валидация
            if (!data.fullname || !data.facility || !data.phone || !data.orderDate) {
                showAlert('Пожалуйста, заполните все обязательные поля', 'error');
                return;
            }
            
            // Простая валидация телефона
            const phoneRegex = /^[+]?[\d\s()-]{10,}$/;
            if (!phoneRegex.test(data.phone)) {
                showAlert('Пожалуйста, введите корректный номер телефона', 'error');
                return;
            }
            
            // Отправляем данные
            submitOrder(data);
        });
        
        // Заполняем даты при загрузке
        populateDates();
    </script>
</body>
</html>
